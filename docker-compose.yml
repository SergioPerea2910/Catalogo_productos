services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: catalogo_backend
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: sh -c "composer install && touch database/database.sqlite && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=8000"
